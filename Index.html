<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Input Data Produksi</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1923;
    --surface: #1a2635;
    --border: #263447;
    --accent: #00c9a7;
    --accent2: #0077ff;
    --text: #e8f0fe;
    --muted: #7a90a8;
    --danger: #ff5c5c;
    --success: #00c9a7;
    --font: 'Segoe UI', system-ui, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    padding-bottom: 2rem;
  }

  header {
    background: linear-gradient(135deg, #0d2137 0%, #0a3d62 100%);
    padding: 1.25rem 1.25rem 1rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text);
  }

  header p {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
  }
  .status-dot.connected { background: var(--accent); }

  .status-text {
    font-size: 0.7rem;
    color: var(--muted);
  }

  .container { padding: 1rem; }

  /* Setup card */
  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 1rem;
  }

  .setup-card h2 {
    font-size: 0.8rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 0.75rem;
  }

  .url-row {
    display: flex;
    gap: 8px;
  }

  .url-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.75rem;
    color: var(--text);
    font-size: 0.78rem;
  }

  .url-row input::placeholder { color: var(--muted); }

  .btn-test {
    background: var(--accent2);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.6rem 0.9rem;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }

  .hint {
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 6px;
    line-height: 1.5;
  }

  /* Form card */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 1rem;
  }

  .form-card h2 {
    font-size: 0.8rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 1rem;
  }

  .field { margin-bottom: 0.9rem; }

  label {
    display: block;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  input, select, textarea {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 0.85rem;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.95rem;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  select option { background: #1a2635; }

  textarea { resize: none; height: 80px; }

  .row2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  /* Downtime toggle */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 0.85rem;
    cursor: pointer;
  }

  .toggle-label { font-size: 0.9rem; }

  .toggle {
    width: 42px; height: 24px;
    background: var(--border);
    border-radius: 12px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .toggle.on { background: var(--accent); }

  .toggle::after {
    content: '';
    width: 18px; height: 18px;
    background: #fff;
    border-radius: 50%;
    position: absolute;
    top: 3px; left: 3px;
    transition: transform 0.2s;
  }

  .toggle.on::after { transform: translateX(18px); }

  .downtime-fields {
    display: none;
    margin-top: 0.75rem;
  }

  .downtime-fields.visible { display: block; }

  /* Submit */
  .btn-submit {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #0099ff);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 1rem;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: opacity 0.2s;
  }

  .btn-submit:active { opacity: 0.8; }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1e3a2f;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 10px;
    padding: 0.75rem 1.25rem;
    font-size: 0.85rem;
    font-weight: 600;
    transition: transform 0.3s ease;
    white-space: nowrap;
    z-index: 99;
  }

  .toast.error {
    background: #3a1e1e;
    border-color: var(--danger);
    color: var(--danger);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Log */
  .log-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
  }

  .log-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
  }

  .log-header h2 {
    font-size: 0.8rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .btn-clear {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 0.7rem;
    padding: 3px 10px;
    cursor: pointer;
  }

  .log-empty {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    padding: 1rem 0;
  }

  .log-item {
    border-top: 1px solid var(--border);
    padding: 0.6rem 0;
    font-size: 0.78rem;
    line-height: 1.6;
  }

  .log-item .log-time { color: var(--muted); font-size: 0.68rem; }
  .log-item .log-mesin { font-weight: 700; color: var(--text); }
  .log-item .log-detail { color: var(--muted); }
  .log-item .log-badge {
    display: inline-block;
    background: #12302a;
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 0.68rem;
    margin-left: 4px;
  }
  .log-item .log-badge.err {
    background: #2e1212;
    color: var(--danger);
  }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>📊 Input Data Produksi</h1>
  <p id="tanggalHariIni"></p>
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Belum terhubung ke Google Sheets</span>
  </div>
</header>

<div class="container">

  <!-- Setup URL -->
  <div class="setup-card">
    <h2>⚙ Koneksi Google Sheets</h2>
    <div class="url-row">
      <input type="url" id="webhookUrl" placeholder="Tempel URL Google Apps Script di sini" autocomplete="off">
      <button class="btn-test" onclick="testKoneksi()">Test</button>
    </div>
    <p class="hint">Salin URL dari Google Apps Script (Deploy → Web App). Data akan langsung masuk ke spreadsheet Anda.</p>
  </div>

  <!-- Form Input -->
  <div class="form-card">
    <h2>📝 Data Produksi</h2>

    <div class="row2">
      <div class="field">
        <label>Tanggal</label>
        <input type="date" id="tanggal">
      </div>
      <div class="field">
        <label>Shift</label>
        <select id="shift">
          <option value="">Pilih</option>
          <option value="Shift 1">Shift 1</option>
          <option value="Shift 2">Shift 2</option>
          <option value="Shift 3">Shift 3</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Nama / ID Mesin</label>
      <select id="mesin">
        <option value="">— Pilih Mesin —</option>
        <option value="TF5">TF5</option>
        <option value="TF6">TF6</option>
        <option value="TF7">TF7</option>
        <option value="TF8">TF8</option>
        <option value="TF9">TF9</option>
        <option value="TF10">TF10</option>
        <option value="TF11">TF11</option>
        <option value="TF12">TF12</option>
        <option value="TF13">TF13</option>
        <option value="TF14">TF14</option>
        <option value="TF15">TF15</option>
        <option value="TF16">TF16</option>
      </select>
    </div>

    <div class="row2">
      <div class="field">
        <label>Jml Produksi (pcs)</label>
        <input type="number" id="jumlahProduksi" placeholder="0" min="0">
      </div>
      <div class="field">
        <label>Target (pcs)</label>
        <input type="number" id="target" placeholder="0" min="0">
      </div>
    </div>

    <!-- Downtime Toggle -->
    <div class="field">
      <label>Downtime / Kerusakan</label>
      <div class="toggle-row" onclick="toggleDowntime()">
        <span class="toggle-label">Ada downtime?</span>
        <div class="toggle" id="toggleBtn"></div>
      </div>
      <div class="downtime-fields" id="downtimeFields">
        <div class="row2" style="margin-top:0.75rem">
          <div class="field">
            <label>Durasi (menit)</label>
            <input type="number" id="downtimeMenit" placeholder="0" min="0">
          </div>
          <div class="field">
            <label>Jam Mulai</label>
            <input type="time" id="downtimeJam">
          </div>
        </div>
        <div class="field">
          <label>Keterangan Kerusakan</label>
          <textarea id="keterangan" placeholder="Jelaskan penyebab downtime..."></textarea>
        </div>
      </div>
    </div>

    <div class="field">
      <label>Operator (opsional)</label>
      <input type="text" id="operator" placeholder="Nama operator / ID">
    </div>

    <button class="btn-submit" id="btnSubmit" onclick="kirimData()">
      Kirim ke Google Sheets
    </button>
  </div>

  <!-- Log -->
  <div class="log-card">
    <div class="log-header">
      <h2>📋 Riwayat Input</h2>
      <button class="btn-clear" onclick="clearLog()">Hapus</button>
    </div>
    <div id="logList"><p class="log-empty">Belum ada data yang dikirim.</p></div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // Inisialisasi tanggal
  const today = new Date();
  document.getElementById('tanggal').value = today.toISOString().split('T')[0];
  document.getElementById('tanggalHariIni').textContent =
    today.toLocaleDateString('id-ID', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  // Load URL tersimpan
  const savedUrl = localStorage.getItem('webhookUrl');
  if (savedUrl) {
    document.getElementById('webhookUrl').value = savedUrl;
    updateStatus(true);
  }

  let downtimeAktif = false;
  let logData = JSON.parse(localStorage.getItem('logProduksi') || '[]');
  renderLog();

  function toggleDowntime() {
    downtimeAktif = !downtimeAktif;
    document.getElementById('toggleBtn').classList.toggle('on', downtimeAktif);
    document.getElementById('downtimeFields').classList.toggle('visible', downtimeAktif);
  }

  function updateStatus(connected, msg) {
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    dot.className = 'status-dot' + (connected ? ' connected' : '');
    txt.textContent = msg || (connected ? 'Terhubung ke Google Sheets ✓' : 'Belum terhubung ke Google Sheets');
  }

  async function testKoneksi() {
    const url = document.getElementById('webhookUrl').value.trim();
    if (!url) { showToast('Masukkan URL Apps Script dulu!', true); return; }
    localStorage.setItem('webhookUrl', url);
    updateStatus(false, 'Menguji koneksi...');
    try {
      await fetch(url + '?test=1', { method: 'GET', mode: 'no-cors' });
      updateStatus(true);
      showToast('Koneksi berhasil! ✓');
    } catch(e) {
      updateStatus(false, 'Koneksi gagal — cek URL');
      showToast('Koneksi gagal. Periksa URL.', true);
    }
  }

  async function kirimData() {
    const url = document.getElementById('webhookUrl').value.trim();
    if (!url) { showToast('Masukkan URL Google Apps Script dulu!', true); return; }

    const tanggal = document.getElementById('tanggal').value;
    const shift = document.getElementById('shift').value;
    const mesin = document.getElementById('mesin').value;
    const jumlah = document.getElementById('jumlahProduksi').value;
    const target = document.getElementById('target').value;

    if (!tanggal || !shift || !mesin || !jumlah) {
      showToast('Lengkapi: Tanggal, Shift, Mesin, & Produksi', true);
      return;
    }

    const data = {
      tanggal,
      shift,
      mesin,
      jumlah_produksi: parseInt(jumlah) || 0,
      target: parseInt(target) || 0,
      ada_downtime: downtimeAktif ? 'Ya' : 'Tidak',
      downtime_menit: downtimeAktif ? (parseInt(document.getElementById('downtimeMenit').value) || 0) : 0,
      downtime_jam: downtimeAktif ? document.getElementById('downtimeJam').value : '',
      keterangan: downtimeAktif ? document.getElementById('keterangan').value.trim() : '',
      operator: document.getElementById('operator').value.trim(),
      timestamp: new Date().toLocaleString('id-ID')
    };

    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Mengirim...';

    try {
      await fetch(url, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      // Simpan ke log lokal
      logData.unshift({ ...data, status: 'ok' });
      if (logData.length > 50) logData.pop();
      localStorage.setItem('logProduksi', JSON.stringify(logData));
      localStorage.setItem('webhookUrl', url);
      renderLog();
      resetForm();
      showToast('✓ Data berhasil dikirim ke Sheets!');
      updateStatus(true);

    } catch(e) {
      logData.unshift({ ...data, status: 'error' });
      localStorage.setItem('logProduksi', JSON.stringify(logData));
      renderLog();
      showToast('Gagal kirim. Cek koneksi internet.', true);
    }

    btn.disabled = false;
    btn.innerHTML = 'Kirim ke Google Sheets';
  }

  function resetForm() {
    document.getElementById('jumlahProduksi').value = '';
    document.getElementById('target').value = '';
    document.getElementById('downtimeMenit').value = '';
    document.getElementById('downtimeJam').value = '';
    document.getElementById('keterangan').value = '';
    if (downtimeAktif) toggleDowntime();
  }

  function renderLog() {
    const el = document.getElementById('logList');
    if (!logData.length) {
      el.innerHTML = '<p class="log-empty">Belum ada data yang dikirim.</p>';
      return;
    }
    el.innerHTML = logData.slice(0, 10).map(d => `
      <div class="log-item">
        <div class="log-time">${d.timestamp}</div>
        <div>
          <span class="log-mesin">${d.mesin}</span>
          — ${d.shift}
          <span class="log-badge ${d.status === 'error' ? 'err' : ''}">${d.status === 'error' ? '✗ Gagal' : '✓ OK'}</span>
        </div>
        <div class="log-detail">
          Produksi: ${d.jumlah_produksi} pcs
          ${d.target ? '/ Target: ' + d.target + ' pcs' : ''}
          ${d.ada_downtime === 'Ya' ? ' | Downtime: ' + d.downtime_menit + ' mnt' : ''}
        </div>
      </div>
    `).join('');
  }

  function clearLog() {
    if (confirm('Hapus semua riwayat lokal?')) {
      logData = [];
      localStorage.removeItem('logProduksi');
      renderLog();
    }
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '') + ' show';
    setTimeout(() => t.className = 'toast' + (isError ? ' error' : ''), 3000);
  }
</script>
</body>
</html>
